<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Language Recognition</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4f46e5;      /* Modern Indigo */
            --primary-hover: #4338ca;
            --bg: #f3f4f6;           /* Soft gray background */
            --card-bg: #ffffff;
            --text-main: #1f2937;
            --text-muted: #6b7280;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 40px 20px;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            color: var(--text-main);
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        p.subtitle {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        /* --- UPDATED: Side-by-Side Layout --- */
        .main-container {
            display: flex;
            flex-direction: row; /* changed from column */
            justify-content: center;
            align-items: stretch; /* Makes both cards the same height */
            gap: 30px;
            width: 100%;
            max-width: 1100px; /* Widened to fit both cards */
        }

        /* Styling for the webcam feed box */
        .video-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1.5; /* Takes up slightly more room for the video */
        }

        .video-wrapper {
            border-radius: 12px;
            overflow: hidden;
            border: 2px solid #e5e7eb;
            background-color: #000;
            width: 100%;
            display: flex;
            justify-content: center;
        }

        img.webcam-feed {
            width: 100%;
            height: auto;
            display: block;
        }

        /* Styling for the text output box */
        .output-card {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            display: flex;
            flex-direction: column;
            justify-content: center; /* Centers the text box vertically */
            align-items: center;
            flex: 1; /* Takes up the remaining room */
        }

        .output-label {
            text-transform: uppercase;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-muted);
            letter-spacing: 1.5px;
            margin-bottom: 15px;
        }

        .sentence-display {
            font-size: 2.5rem; /* Made the text a bit larger */
            font-weight: 600;
            color: var(--primary);
            min-height: 120px;
            width: 100%;
            padding: 20px;
            background: #f8fafc;
            border-radius: 8px;
            border: 2px dashed #cbd5e1;
            margin-bottom: 30px;
            word-wrap: break-word;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .btn-clear {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 14px 32px;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px rgba(79, 70, 229, 0.2);
            width: 100%; /* Makes the button fill the card width */
        }

        .btn-clear:hover {
            background-color: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(79, 70, 229, 0.3);
        }

        .btn-clear:active {
            transform: translateY(0);
        }
        
        .cursor {
            display: inline-block;
            width: 4px;
            height: 2.5rem;
            background-color: var(--primary);
            margin-left: 5px;
            animation: blink 1s step-end infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        /* --- Responsive Design for smaller screens --- */
        @media (max-width: 900px) {
            .main-container {
                flex-direction: column;
                align-items: center;
            }
            .video-card, .output-card {
                width: 100%;
                max-width: 640px;
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>Sign Language Translation</h1>
        <p class="subtitle">Live Neural Network Interface</p>
    </header>

    <div class="main-container">
        <div class="video-card">
            <div class="video-wrapper">
                <img src="{{ url_for('video') }}" class="webcam-feed" alt="Webcam Feed">
            </div>
        </div>

        <div class="output-card">
            <div class="output-label">Live Formed Sentence</div>
            <div class="sentence-display">
                <span id="sentence-text"></span><span class="cursor"></span>
            </div>
            <button class="btn-clear" onclick="clearSentence()">Clear Translation</button>
        </div>
    </div>

    <script>
        setInterval(() => {
            fetch('/get_sentence')
                .then(response => response.json())
                .then(data => {
                    document.getElementById('sentence-text').innerText = data.sentence;
                });
        }, 500);

        function clearSentence() {
            fetch('/clear_sentence', { method: 'POST' });
            document.getElementById('sentence-text').innerText = "";
        }
    </script>

</body>
</html>
